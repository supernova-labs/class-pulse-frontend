name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: bunx biome ci .
      - name: Tests
        run: bunx jest --ci
      - name: Build
        run: bun run build

  contract-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Fetch backend contract from main
        run: curl -sf https://raw.githubusercontent.com/supernova-labs/class-pulse-backend/main/openapi.json -o /tmp/openapi.json
      - name: Regenerate API types
        run: bunx openapi-typescript /tmp/openapi.json -o src/api/schema.d.ts
      - name: Fail on contract drift
        run: |
          if ! git diff --exit-code src/api/schema.d.ts; then
            echo "::error::src/api/schema.d.ts is out of sync with the backend contract. Run 'bun run gen:api' against the current backend and commit."
            exit 1
          fi

  adr-check:
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'no-adr')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require ADR for architectural changes
        run: |
          changed=$(git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD)
          echo "Changed files:"
          echo "$changed"
          arch_pattern='^(package\.json|vite\.config\.ts|playwright\.config\.ts|src/api/client\.ts|src/main\.tsx|Dockerfile|nginx\.conf|\.github/workflows/)'
          if echo "$changed" | grep -qE "$arch_pattern" && ! echo "$changed" | grep -q '^docs/adr/'; then
            echo "::error::Architectural files changed without an ADR. Add an entry under docs/adr/ or apply the 'no-adr' label."
            exit 1
          fi
          echo "ADR check passed."
